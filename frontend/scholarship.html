<!DOCTYPE html>
<html>
<head>
<title>Scholarship Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/
bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<div class="card p-4 shadow">
<h2>
Scholarship Management
</h2>
<table class="table table-bordered mt-4">
<thead>
<tr>
<th>ID</th>
<th>Student</th>
<th>Scholarship</th>
<th>Approved</th>
<th>Pending</th>
<th>Status</th>
</tr>
</thead>
<tbody id="scholarshipTable">
</tbody>
</table>
</div>
</div>
<script>
async function loadScholarships(){
const response = await fetch(
'http://localhost:5000/api/scholarships'
);
const data = await response.json();
let output = '';
data.forEach(item=>{
output += `
<tr>
<td>${item.id}</td>
<td>${item.student_id}</td>
<td>${item.scholarship_name}</td>
<td>${item.approved_amount}</td>
<td>${item.pending_amount}</td>
<td>${item.status}</td>
</tr>
`;
});
document.getElementById('scholarshipTable').innerHTML = output;
}
loadScholarships();
</script>
</body>
</html>
