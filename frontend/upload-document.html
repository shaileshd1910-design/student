<!DOCTYPE html>
<html>
<head>
<title>Upload Student Document</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/
bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<div class="card p-4 shadow">
<h2>
Upload Student Document
</h2>
<form id="documentForm">
<input type="number" id="student_id" class="form-control mb-3"
placeholder="Student ID">
<input type="text" id="document_name" class="form-control mb-3"
placeholder="Document Name">
<input type="file" id="document_file" class="form-control mb-3">
<button class="btn btn-primary">
Upload Document
</button>
</form>
</div>
</div>
<script>
document.getElementById('documentForm').addEventListener('submit',
async(e)=>{
e.preventDefault();
const formData = new FormData();
formData.append('student_id',document.getElementById('student_id').value);
formData.append('document_name',document.getElementById('document_name').value);
formData.append('document_file',document.getElementById('document_file').files[0]);
const response = await fetch(
'http://localhost:5000/api/documents/upload',
{
method:'POST',
body:formData
}
);
const result = await response.json();
alert(result.message);
});
</script>
</body>
</html>
