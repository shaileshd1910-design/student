<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    background:linear-gradient(to right,#0d6efd,#6610f2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.login-card{
    width:400px;
    background:white;
    border-radius:15px;
    padding:35px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0d6efd;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:35px;
}

.logo h2{
    margin-top:15px;
    font-weight:bold;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-login{
    width:100%;
    height:50px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.error-msg{
    color:red;
    text-align:center;
    margin-top:10px;
    display:none;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<div class="logo-circle">

<i class="fa fa-user-shield"></i>

</div>

<h2>
Admin Login
</h2>

<p class="text-muted">
Student Management System
</p>

</div>

<form id="adminLoginForm">

<div class="mb-3">

<label>
Username
</label>

<input
type="text"
id="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

<div class="mb-3">

<label>
Password
</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<button type="submit"
class="btn btn-primary btn-login">

<i class="fa fa-sign-in-alt"></i>
 Login

</button>

<div class="error-msg" id="errorMsg">

Invalid Username or Password

</div>

</form>

</div>

<script>

document.getElementById("adminLoginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    try{

        const response = await fetch(

            "http://localhost:5000/login",

            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    username,
                    password

                })

            }

        );

        const data = await response.json();

        if(data.success){

            localStorage.setItem("admin","true");

            localStorage.setItem(
                "adminName",
                data.username
            );

            window.location.href =
            "dashboard.html";

        }

        else{

            document.getElementById("errorMsg")
            .style.display = "block";

        }

    }

    catch(error){

        console.log(error);

        alert("Server Error");

    }

});

</script>

</body>

</html>
