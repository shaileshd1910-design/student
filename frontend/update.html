<!DOCTYPE html>
<html>

<head>

<title>Update Student</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{

    background:#f1f5f9;

}

.card{

    border-radius:15px;

}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="mb-3">
Update Student
</h3>

<hr>

<form id="updateForm">

<div class="row">

<!-- STUDENT ID -->

<div class="col-md-6">

<label class="mb-1">
Student ID
</label>

<input
type="text"
id="student_id"
class="form-control mb-3"
readonly
>

</div>

<!-- STUDENT NAME -->

<div class="col-md-6">

<label class="mb-1">
Student Name
</label>

<input
type="text"
id="student_name"
class="form-control mb-3"
required
>

</div>

<!-- FATHER NAME -->

<div class="col-md-6">

<label class="mb-1">
Father Name
</label>

<input
type="text"
id="father_name"
class="form-control mb-3"
required
>

</div>

<!-- MOBILE -->

<div class="col-md-6">

<label class="mb-1">
Mobile
</label>

<input
type="text"
id="mobile"
class="form-control mb-3"
required
>

</div>

<!-- COURSE -->

<div class="col-md-6">

<label class="mb-1">
Course
</label>

<input
type="text"
id="course"
class="form-control mb-3"
required
>

</div>

<!-- YEAR -->

<div class="col-md-6">

<label class="mb-1">
Year
</label>

<input
type="text"
id="year"
class="form-control mb-3"
required
>

</div>

<!-- TOTAL FEES -->

<div class="col-md-4">

<label class="mb-1">
Total Fees
</label>

<input
type="number"
id="total_fees"
class="form-control mb-3"
required
>

</div>

<!-- PAID FEES -->

<div class="col-md-4">

<label class="mb-1">
Paid Fees
</label>

<input
type="number"
id="paid_amount"
class="form-control mb-3"
required
>

</div>

<!-- PENDING FEES -->

<div class="col-md-4">

<label class="mb-1">
Pending Fees
</label>

<input
type="number"
id="pending_amount"
class="form-control mb-3"
readonly
>

</div>

<!-- ADDRESS -->

<div class="col-md-12">

<label class="mb-1">
Address
</label>

<textarea
id="address"
class="form-control mb-3"
rows="4"
></textarea>

</div>

</div>

<button
type="submit"
class="btn btn-primary"
>

Update Student

</button>

<a
href="studentlist.html"
class="btn btn-secondary ms-2"
>

Back

</a>

</form>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const id = params.get("id");

/* =========================
   LOAD STUDENT
========================= */

async function loadStudent(){

    try{

        const response = await fetch(

            `http://localhost:5000/students/${id}`

        );

        if(!response.ok){

            throw new Error("Student Not Found");

        }

        const student = await response.json();

        console.log(student);

        document.getElementById("student_id").value =
        student.student_id || "";

        document.getElementById("student_name").value =
        student.student_name || "";

        document.getElementById("father_name").value =
        student.father_name || "";

        document.getElementById("mobile").value =
        student.mobile || "";

        document.getElementById("course").value =
        student.course || "";

        document.getElementById("year").value =
        student.year || "";

        document.getElementById("total_fees").value =
        student.total_fees || 0;

        document.getElementById("paid_amount").value =
        student.paid_amount || 0;

        document.getElementById("pending_amount").value =
        student.pending_amount || 0;

        document.getElementById("address").value =
        student.address || "";

    }

    catch(error){

        console.log(error);

        alert("Failed To Load Student Data");

    }

}

loadStudent();

/* =========================
   AUTO CALCULATE PENDING
========================= */

function calculatePending(){

    const total =
    Number(document.getElementById("total_fees").value);

    const paid =
    Number(document.getElementById("paid_amount").value);

    const pending =
    total - paid;

    document.getElementById("pending_amount").value =
    pending;

}

document
.getElementById("total_fees")
.addEventListener("input", calculatePending);

document
.getElementById("paid_amount")
.addEventListener("input", calculatePending);

/* =========================
   UPDATE STUDENT
========================= */

document.getElementById("updateForm")

.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const data = {

        student_name:
        document.getElementById("student_name").value,

        father_name:
        document.getElementById("father_name").value,

        mobile:
        document.getElementById("mobile").value,

        course:
        document.getElementById("course").value,

        year:
        document.getElementById("year").value,

        total_fees:
        document.getElementById("total_fees").value,

        paid_amount:
        document.getElementById("paid_amount").value,

        address:
        document.getElementById("address").value

    };

    try{

        const response = await fetch(

            `http://localhost:5000/students/update-info/${id}`,

            {

                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(data)

            }

        );

        const result = await response.json();

        alert(result.message);

        // REDIRECT TO STUDENT LIST
        window.location.href = "students.html";

    }

    catch(error){

        console.log(error);

        alert("Update Failed");

    }

});

</script>

</body>

</html>
